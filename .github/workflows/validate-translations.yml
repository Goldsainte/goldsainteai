name: Validate Translations

on:
  push:
    paths:
      - 'src/i18n/locales/**'
  pull_request:
    paths:
      - 'src/i18n/locales/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-node@v5
        with:
          node-version: '18'
      
      - name: Validate translations
        run: node scripts/validate-translations.js
