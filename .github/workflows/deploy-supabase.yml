name: Deploy Supabase Backend

# Pushes edge functions + database migrations to the production Supabase
# project (ktzsgqrqvwtxlimctkaf) whenever backend code changes on main.
#
# Required GitHub repo secrets:
#   SUPABASE_ACCESS_TOKEN  - personal access token from https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD   - database password for project ktzsgqrqvwtxlimctkaf (needed for db push)
#
# The project ref is intentionally hardcoded — this workflow only ever targets
# the live Goldsainte backend. Lovable Cloud is not touched by this workflow.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:
    inputs:
      skip_db_push:
        description: 'Run db push? Default skips it. Set to false only if you want migrations pushed.'
        required: false
        default: 'true'

concurrency:
  group: supabase-deploy-main
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_REF: ktzsgqrqvwtxlimctkaf
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

jobs:
  deploy:
    name: Deploy edge functions + migrations
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push database migrations
        if: ${{ github.event.inputs.skip_db_push == 'false' }}
        run: supabase db push

      - name: Deploy edge functions
        # esm.sh (the CDN functions import from) occasionally times out
        # mid-bundle (HTTP 522). That's transient — retry up to 3 times
        # before declaring a real failure.
        run: |
          for attempt in 1 2 3; do
            if supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF"; then
              exit 0
            fi
            echo "::warning::Deploy attempt $attempt failed — retrying in 45s (transient CDN errors are common)"
            sleep 45
          done
          echo "::error::Deploy failed 3 times — this is likely a real problem, not a flake"
          exit 1

      - name: Summary
        run: |
          echo "## ✅ Supabase backend deployed" >> $GITHUB_STEP_SUMMARY
          echo "Project: \`$SUPABASE_PROJECT_REF\`" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
