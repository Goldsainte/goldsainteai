name: Deploy Supabase Backend

# Pushes edge functions + database migrations to the production Supabase
# project (ktzsgqrqvwtxlimctkaf) whenever backend code changes on main.
#
# Required GitHub repo secrets:
#   SUPABASE_ACCESS_TOKEN  - personal access token from https://supabase.com/dashboard/account/tokens
#   SUPABASE_DB_PASSWORD   - database password for project ktzsgqrqvwtxlimctkaf (needed for db push)
#
# The project ref is intentionally hardcoded — this workflow only ever targets
# the live Goldsainte backend. Lovable Cloud is not touched by this workflow.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:
    inputs:
      skip_db_push:
        description: 'Skip database migrations'
        required: false
        default: 'false'

concurrency:
  group: supabase-deploy-main
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_REF: ktzsgqrqvwtxlimctkaf
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

jobs:
  deploy:
    name: Deploy edge functions + migrations
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push database migrations
        if: ${{ github.event.inputs.skip_db_push != 'true' }}
        run: supabase db push

      - name: Deploy edge functions
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF"

      - name: Summary
        run: |
          echo "## ✅ Supabase backend deployed" >> $GITHUB_STEP_SUMMARY
          echo "Project: \`$SUPABASE_PROJECT_REF\`" >> $GITHUB_STEP_SUMMARY
          echo "Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY